services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: vno-server:latest
    restart: unless-stopped
    init: true
    ports:
      - "6541:6541"
    environment:
      VNO_DATA_DIRECTORY: /app/data
      VNO_SERVER_PORT: "6541"
      VNO_SERVER_TRANSPORT: WebSocket
      VNO_AUTH_HOST: vno-master-rjrun.ondigitalocean.app
      VNO_AUTH_PORT: "443"
      VNO_AUTH_TRANSPORT: WebSocket
      VNO_AUTH_TLS: "true"
      VNO_AUTH_USERNAME: "${VNO_AUTH_USERNAME:?set VNO_AUTH_USERNAME}"
      VNO_AUTH_PASSWORD_FILE: /run/secrets/vno_auth_password
      VNO_AUTH_REMEMBER: "true"
      VNO_ADMIN_BIND: 0.0.0.0
      VNO_ADMIN_PORT: "6542"
      VNO_ADMIN_TOKEN_FILE: /app/data/admin.token
    secrets:
      - vno_auth_password
    volumes:
      - server-data:/app/data
    mem_limit: 512m
    networks:
      - default
      - admin

  console:
    profiles: ["console"]
    build:
      context: .
      dockerfile: Dockerfile
      target: console
    image: vno-server-console:latest
    depends_on:
      - server
    command: ["--url", "ws://server:6542/admin", "--token-file", "/data/admin.token"]
    stdin_open: true
    tty: true
    volumes:
      - server-data:/data:ro
    networks:
      - admin

secrets:
  vno_auth_password:
    file: ./secrets/vno_auth_password.txt

volumes:
  server-data:

networks:
  admin:
    internal: true
